<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Фтизиатрия — Тестирование</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { min-height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #1a2e4a 50%, #0f172a 100%); font-family: 'Segoe UI', system-ui, sans-serif; color: #e2e8f0; }
.container { max-width: 740px; margin: 0 auto; padding: 32px 20px; }
.home-header { text-align: center; margin-bottom: 40px; }
h1 { font-size: clamp(20px,4vw,32px); font-weight: 800; color: #f0f9ff; letter-spacing: -0.5px; margin-bottom: 8px; }
.subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 28px; }
.mode-tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 28px; }
.mode-tab { padding: 10px 28px; border-radius: 30px; border: 1.5px solid rgba(56,189,248,0.3); background: rgba(14,165,233,0.07); color: #94a3b8; cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit; transition: all 0.2s; }
.mode-tab.active { background: rgba(14,165,233,0.2); border-color: #38bdf8; color: #38bdf8; }
.mode-tab:hover { border-color: #38bdf8; color: #38bdf8; }
.sections-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
.section-btn { background: rgba(14,165,233,0.09); border: 1.5px solid rgba(56,189,248,0.25); border-radius: 14px; padding: 18px 10px; cursor: pointer; color: #e2e8f0; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: all 0.2s; }
.section-btn:hover { background: rgba(14,165,233,0.2); border-color: #38bdf8; transform: translateY(-2px); }
.section-btn.read-mode { border-color: rgba(52,211,153,0.3); }
.section-btn.read-mode:hover { background: rgba(52,211,153,0.15); border-color: #34d399; }
.snum { font-size: 28px; font-weight: 800; color: #38bdf8; line-height: 1; }
.section-btn.read-mode .snum { color: #34d399; }
.slabel { font-size: 12px; color: #94a3b8; }
.scount { font-size: 11px; color: #64748b; }
.screen-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.back-btn { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 22px; padding: 4px; line-height: 1; flex-shrink: 0; }
.progress-wrap { flex: 1; }
.progress-meta { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 12px; color: #64748b; font-weight: 600; }
.progress-bar { height: 5px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.progress-fill.quiz-fill { background: linear-gradient(90deg,#0ea5e9,#38bdf8); }
.progress-fill.read-fill { background: linear-gradient(90deg,#059669,#34d399); }
.score-badge { background: rgba(56,189,248,0.13); border: 1px solid rgba(56,189,248,0.28); border-radius: 20px; padding: 4px 11px; font-size: 12px; color: #38bdf8; font-weight: 700; white-space: nowrap; flex-shrink:0; }
.read-card { background: rgba(255,255,255,0.04); border: 1.5px solid rgba(52,211,153,0.15); border-radius: 18px; padding: 22px; margin-bottom: 14px; }
.read-q { font-size: clamp(13px,2.3vw,16px); line-height: 1.65; color: #f1f5f9; font-weight: 600; margin-bottom: 16px; }
.read-answers { display: flex; flex-direction: column; gap: 8px; }
.read-ans { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-radius: 10px; font-size: clamp(12px,2vw,14px); line-height: 1.5; }
.read-ans.correct-ans { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.25); color: #bbf7d0; }
.read-ans.wrong-ans { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); color: #94a3b8; }
.read-marker { width: 22px; height: 22px; min-width: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; margin-top: 1px; flex-shrink: 0; }
.read-marker.ok { background: #4ade80; color: #0f172a; }
.read-marker.no { background: rgba(255,255,255,0.08); color: #64748b; }
.read-nav { display: flex; gap: 10px; margin-top: 4px; }
.nav-btn { flex: 1; border: none; border-radius: 13px; padding: 13px; cursor: pointer; font-weight: 700; font-size: 15px; font-family: inherit; transition: all 0.2s; }
.nav-prev { background: rgba(255,255,255,0.05); color: #94a3b8; }
.nav-prev:hover { background: rgba(255,255,255,0.1); }
.nav-next { background: linear-gradient(135deg,#059669,#34d399); color: #0f172a; }
.nav-finish { background: linear-gradient(135deg,#059669,#34d399); color: #0f172a; }
.multi-badge { background: rgba(251,191,36,0.13); border: 1px solid rgba(251,191,36,0.35); border-radius: 8px; padding: 7px 14px; margin-bottom: 12px; font-size: 12px; color: #fbbf24; }
.all-badge { background: rgba(167,139,250,0.13); border: 1px solid rgba(167,139,250,0.35); border-radius: 8px; padding: 7px 14px; margin-bottom: 12px; font-size: 12px; color: #c4b5fd; }
.question-card { background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.07); border-radius: 18px; padding: 22px; margin-bottom: 14px; font-size: clamp(13px,2.3vw,16px); line-height: 1.65; color: #f1f5f9; font-weight: 500; }
.answers { display: flex; flex-direction: column; gap: 9px; margin-bottom: 14px; }
.answer-btn { background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.09); border-radius: 13px; padding: 12px 15px; text-align: left; cursor: pointer; color: #cbd5e1; font-size: clamp(12px,2vw,14px); line-height: 1.5; transition: all 0.17s; display: flex; align-items: flex-start; gap: 10px; font-family: inherit; width: 100%; }
.answer-btn:hover:not(:disabled) { background: rgba(255,255,255,0.09); }
.answer-btn.selected { background: rgba(56,189,248,0.11); border-color: #38bdf8; color: #bae6fd; }
.answer-btn.correct { background: rgba(74,222,128,0.12); border-color: #4ade80; color: #bbf7d0; }
.answer-btn.wrong { background: rgba(248,113,113,0.11); border-color: #f87171; color: #fecaca; }
.marker { width: 26px; height: 26px; min-width: 26px; border-radius: 50%; background: rgba(255,255,255,0.07); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #64748b; transition: all 0.17s; margin-top: 1px; }
.marker.sel { background: #38bdf8; color: #0f172a; }
.marker.ok { background: #4ade80; color: #0f172a; }
.marker.err { background: #f87171; color: #0f172a; }
.correct-hint { background: rgba(74,222,128,0.07); border: 1px solid rgba(74,222,128,0.22); border-radius: 12px; padding: 11px 14px; margin-bottom: 13px; font-size: 13px; }
.correct-hint .hlabel { color: #86efac; margin-bottom: 4px; }
.correct-hint .htext { color: #4ade80; font-weight: 600; }
.action-btn { width: 100%; border: none; border-radius: 13px; padding: 14px; cursor: pointer; font-weight: 700; font-size: 15px; transition: all 0.2s; font-family: inherit; }
.action-btn.confirm { background: rgba(255,255,255,0.04); color: #475569; cursor: not-allowed; }
.action-btn.confirm.active { background: linear-gradient(135deg,#0ea5e9,#38bdf8); color: #0f172a; cursor: pointer; }
.action-btn.next { background: linear-gradient(135deg,#0ea5e9,#38bdf8); color: #0f172a; cursor: pointer; }
.result-header { text-align: center; margin-bottom: 26px; }
.result-emoji { font-size: 56px; margin-bottom: 8px; }
.result-title { font-size: 24px; font-weight: 800; color: #f0f9ff; margin-bottom: 3px; }
.result-sub { color: #94a3b8; font-size: 13px; }
.result-stats { background: rgba(14,165,233,0.07); border: 1.5px solid rgba(56,189,248,0.22); border-radius: 18px; padding: 22px; display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-bottom: 22px; }
.stat { text-align: center; }
.stat-val { font-size: 40px; font-weight: 800; line-height: 1; }
.stat-label { font-size: 12px; color: #94a3b8; margin-top: 3px; }
.errors-title { font-size: 16px; font-weight: 700; color: #f87171; margin-bottom: 12px; }
.errors-list { display: flex; flex-direction: column; gap: 9px; }
.error-card { background: rgba(248,113,113,0.06); border: 1px solid rgba(248,113,113,0.18); border-radius: 11px; padding: 13px; }
.error-q { font-size: 13px; color: #cbd5e1; line-height: 1.5; margin-bottom: 7px; }
.error-wrong { font-size: 12px; color: #fca5a5; margin-bottom: 3px; }
.error-right { font-size: 12px; color: #4ade80; }
.result-btns { display: flex; gap: 10px; margin-top: 22px; flex-wrap: wrap; }
.result-btn { flex: 1; min-width: 130px; border-radius: 11px; padding: 12px 18px; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.2s; font-family: inherit; }
.result-btn.retry { background: rgba(56,189,248,0.13); border: 1.5px solid #38bdf8; color: #38bdf8; }
.result-btn.retry:hover { background: rgba(56,189,248,0.25); }
.result-btn.home { background: rgba(148,163,184,0.09); border: 1.5px solid rgba(148,163,184,0.28); color: #94a3b8; }
.result-btn.home:hover { background: rgba(148,163,184,0.18); }
.hidden { display: none !important; }
</style>
</head>
<body>

<div id="screen-home" class="container">
  <div class="home-header">
    <svg viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg" width="80" height="40" style="display:block;margin:0 auto 16px">
      <ellipse cx="30" cy="22" rx="16" ry="10" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
      <ellipse cx="50" cy="22" rx="16" ry="10" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
      <line x1="40" y1="22" x2="40" y2="8" stroke="#38bdf8" stroke-width="2"/>
    </svg>
    <h1>Фтизиатрия — Тестирование</h1>
    <p class="subtitle" id="home-subtitle"></p>
    <div class="mode-tabs">
      <button class="mode-tab active" id="tab-quiz" onclick="setMode('quiz')">📝 Тест</button>
      <button class="mode-tab" id="tab-read" onclick="setMode('read')">📖 Читать</button>
    </div>
  </div>
  <div class="sections-grid" id="sections-grid"></div>
</div>

<div id="screen-read" class="container hidden">
  <div class="screen-header">
    <button class="back-btn" onclick="goHome()">&#8592;</button>
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="read-label">Раздел 1 — Чтение</span>
        <span id="read-counter">1 / 50</span>
      </div>
      <div class="progress-bar"><div class="progress-fill read-fill" id="read-progress" style="width:0%"></div></div>
    </div>
  </div>
  <div class="read-card">
    <div class="read-q" id="read-question"></div>
    <div class="read-answers" id="read-answers"></div>
  </div>
  <div class="read-nav">
    <button class="nav-btn nav-prev hidden" id="read-prev" onclick="readPrev()">← Назад</button>
    <button class="nav-btn nav-next" id="read-next" onclick="readNext()">Вперёд →</button>
  </div>
</div>

<div id="screen-quiz" class="container hidden">
  <div class="screen-header">
    <button class="back-btn" onclick="goHome()">&#8592;</button>
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="quiz-label">Раздел 1</span>
        <span id="quiz-counter">1 / 50</span>
      </div>
      <div class="progress-bar"><div class="progress-fill quiz-fill" id="quiz-progress" style="width:0%"></div></div>
    </div>
    <div class="score-badge" id="score-badge">0 ✓</div>
  </div>
  <div class="multi-badge hidden" id="multi-badge">☑ Выберите все правильные ответы</div>
  <div class="all-badge hidden" id="all-badge">☑ Все варианты правильные — выберите все</div>
  <div class="question-card" id="question-text"></div>
  <div class="answers" id="answers"></div>
  <div class="correct-hint hidden" id="correct-hint">
    <div class="hlabel" id="hint-label">✓ Правильный ответ:</div>
    <div class="htext" id="correct-hint-text"></div>
  </div>
  <button class="action-btn confirm" id="btn-confirm">Подтвердить ответ</button>
  <button class="action-btn next hidden" id="btn-next">Следующий вопрос →</button>
</div>

<div id="screen-result" class="container hidden">
  <div class="result-header">
    <div class="result-emoji" id="result-emoji">🎯</div>
    <div class="result-title" id="result-title">Раздел завершён</div>
    <div class="result-sub">Результаты тестирования</div>
  </div>
  <div class="result-stats">
    <div class="stat"><div class="stat-val" id="stat-pct">0%</div><div class="stat-label">Процент</div></div>
    <div class="stat"><div class="stat-val" id="stat-score" style="color:#38bdf8">0/50</div><div class="stat-label">Правильных</div></div>
    <div class="stat"><div class="stat-val" id="stat-grade" style="font-size:22px;padding-top:10px">—</div><div class="stat-label">Оценка</div></div>
  </div>
  <div id="errors-block"></div>
  <div class="result-btns">
    <button class="result-btn retry" id="btn-retry">🔄 Повторить тест</button>
    <button class="result-btn home" id="btn-home-r">← К разделам</button>
  </div>
</div>

<script>

const PER = 50;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let sections = [];
function buildSections() {
  sections = [];
  for (let i = 0; i < RAW_QUESTIONS.length; i += PER) {
    const block = shuffle(RAW_QUESTIONS.slice(i, i + PER));
    sections.push(block.map(q => {
      const allCorrect = q.wrong.length === 0;
      const allAnswers = allCorrect ? shuffle([...q.correct]) : shuffle([...q.correct, ...q.wrong]);
      return { ...q, allAnswers, correctSet: new Set(q.correct), allCorrect };
    }));
  }
}

let currentMode = 'quiz';
let state = {};

function setMode(mode) {
  currentMode = mode;
  document.getElementById('tab-quiz').classList.toggle('active', mode === 'quiz');
  document.getElementById('tab-read').classList.toggle('active', mode === 'read');
  renderGrid();
}

function show(id) {
  ['home','read','quiz','result'].forEach(s =>
    document.getElementById('screen-' + s).classList.toggle('hidden', s !== id));
}

function goHome() { show('home'); }

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderGrid() {
  document.getElementById('home-subtitle').textContent =
    RAW_QUESTIONS.length + ' вопросов · ' + sections.length + ' разделов · по ' + PER + ' вопросов';
  const grid = document.getElementById('sections-grid');
  grid.innerHTML = '';
  sections.forEach((sec, i) => {
    const btn = document.createElement('button');
    btn.className = 'section-btn' + (currentMode === 'read' ? ' read-mode' : '');
    btn.innerHTML = '<span class="snum">'+(i+1)+'</span><span class="slabel">Раздел</span><span class="scount">'+sec.length+' вопросов</span>';
    btn.onclick = () => currentMode === 'read' ? startRead(i) : startQuiz(i);
    grid.appendChild(btn);
  });
}

let readState = {};

function startRead(idx) {
  readState = { sectionIdx: idx, qIdx: 0 };
  renderRead();
  show('read');
}

function renderRead() {
  const sec = sections[readState.sectionIdx];
  const q = sec[readState.qIdx];
  const total = sec.length;
  const idx = readState.qIdx;
  document.getElementById('read-label').textContent = 'Раздел ' + (readState.sectionIdx + 1) + ' — Чтение';
  document.getElementById('read-counter').textContent = (idx + 1) + ' / ' + total;
  document.getElementById('read-progress').style.width = ((idx + 1) / total * 100) + '%';
  document.getElementById('read-question').textContent = q.question;
  const allAns = [...q.correct.map(a => ({text: a, ok: true})), ...q.wrong.map(a => ({text: a, ok: false}))];
  const answersEl = document.getElementById('read-answers');
  answersEl.innerHTML = '';
  allAns.forEach((ans, i) => {
    const div = document.createElement('div');
    div.className = 'read-ans ' + (ans.ok ? 'correct-ans' : 'wrong-ans');
    div.innerHTML = '<span class="read-marker '+(ans.ok?'ok':'no')+'">'+(ans.ok?'✓':String.fromCharCode(65+i))+'</span><span>'+esc(ans.text)+'</span>';
    answersEl.appendChild(div);
  });
  document.getElementById('read-prev').classList.toggle('hidden', idx === 0);
  const nextBtn = document.getElementById('read-next');
  const isLast = idx + 1 >= total;
  nextBtn.textContent = isLast ? 'Завершить раздел ✓' : 'Вперёд →';
  nextBtn.className = 'nav-btn ' + (isLast ? 'nav-finish' : 'nav-next');
}

function readNext() {
  const sec = sections[readState.sectionIdx];
  if (readState.qIdx + 1 >= sec.length) { goHome(); return; }
  readState.qIdx++;
  renderRead();
}

function readPrev() {
  if (readState.qIdx > 0) { readState.qIdx--; renderRead(); }
}

function startQuiz(idx) {
  state = { sectionIdx: idx, questionIdx: 0, selectedSet: new Set(), confirmed: false, score: 0, wrongAnswers: [] };
  renderQuiz();
  show('quiz');
}

function renderQuiz() {
  const sec = sections[state.sectionIdx], q = sec[state.questionIdx];
  const total = sec.length, idx = state.questionIdx;
  document.getElementById('quiz-label').textContent = 'Раздел ' + (state.sectionIdx + 1);
  document.getElementById('quiz-counter').textContent = (idx + 1) + ' / ' + total;
  document.getElementById('quiz-progress').style.width = (idx / total * 100) + '%';
  document.getElementById('score-badge').textContent = state.score + ' ✓';
  document.getElementById('question-text').textContent = q.question;
  document.getElementById('multi-badge').classList.toggle('hidden', !q.multi || q.allCorrect);
  document.getElementById('all-badge').classList.toggle('hidden', !q.allCorrect);
  document.getElementById('correct-hint').classList.add('hidden');
  const answersEl = document.getElementById('answers');
  answersEl.innerHTML = '';
  q.allAnswers.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn'; btn.dataset.ans = ans;
    btn.innerHTML = '<span class="marker" id="mk-'+i+'">'+String.fromCharCode(65+i)+'</span><span>'+esc(ans)+'</span>';
    btn.onclick = () => toggleAnswer(ans, i);
    answersEl.appendChild(btn);
  });
  document.getElementById('btn-confirm').className = 'action-btn confirm';
  document.getElementById('btn-confirm').classList.remove('hidden');
  document.getElementById('btn-next').classList.add('hidden');
  state.selectedSet = new Set(); state.confirmed = false;
}

function toggleAnswer(ans, idx) {
  if (state.confirmed) return;
  const q = sections[state.sectionIdx][state.questionIdx];
  const btns = document.querySelectorAll('.answer-btn');
  const mk = document.getElementById('mk-' + idx);
  if (!q.multi && !q.allCorrect) {
    btns.forEach((b, i) => {
      b.classList.remove('selected');
      const m = document.getElementById('mk-'+i);
      if (m) { m.className = 'marker'; m.textContent = String.fromCharCode(65+i); }
    });
    state.selectedSet = new Set([ans]);
    btns[idx].classList.add('selected'); mk.className = 'marker sel';
  } else {
    if (state.selectedSet.has(ans)) {
      state.selectedSet.delete(ans); btns[idx].classList.remove('selected');
      mk.className = 'marker'; mk.textContent = String.fromCharCode(65+idx);
    } else {
      state.selectedSet.add(ans); btns[idx].classList.add('selected'); mk.className = 'marker sel';
    }
  }
  document.getElementById('btn-confirm').classList.toggle('active', state.selectedSet.size > 0);
}

function confirmAnswer() {
  if (!state.selectedSet.size) return;
  state.confirmed = true;
  const q = sections[state.sectionIdx][state.questionIdx];
  const selected = state.selectedSet;
  const isCorrect = [...q.correctSet].every(c => selected.has(c)) && [...selected].every(s => q.correctSet.has(s));
  if (isCorrect) { state.score++; }
  else { state.wrongAnswers.push({ question: q.question, yourAnswer: [...selected].join(' | '), correctAnswer: q.correct.join(' | ') }); }
  document.querySelectorAll('.answer-btn').forEach((btn, i) => {
    const ans = btn.dataset.ans, mk = document.getElementById('mk-'+i);
    if (q.correctSet.has(ans)) { btn.classList.remove('selected'); btn.classList.add('correct'); mk.className = 'marker ok'; mk.textContent = '✓'; }
    else if (selected.has(ans)) { btn.classList.remove('selected'); btn.classList.add('wrong'); mk.className = 'marker err'; mk.textContent = '✗'; }
    btn.disabled = true;
  });
  if (!isCorrect) {
    document.getElementById('hint-label').textContent = q.correct.length > 1 ? '✓ Правильные ответы:' : '✓ Правильный ответ:';
    document.getElementById('correct-hint-text').textContent = q.correct.join(' | ');
    document.getElementById('correct-hint').classList.remove('hidden');
  }
  document.getElementById('score-badge').textContent = state.score + ' ✓';
  document.getElementById('btn-confirm').classList.add('hidden');
  const nextBtn = document.getElementById('btn-next');
  nextBtn.classList.remove('hidden');
  nextBtn.textContent = state.questionIdx + 1 >= sections[state.sectionIdx].length ? 'Завершить раздел →' : 'Следующий вопрос →';
}

function nextQuestion() {
  if (state.questionIdx + 1 >= sections[state.sectionIdx].length) { renderResult(); show('result'); }
  else { state.questionIdx++; renderQuiz(); }
}

function renderResult() {
  const total = sections[state.sectionIdx].length;
  const pct = Math.round(state.score / total * 100);
  const grade = pct >= 90 ? 'Отлично' : pct >= 75 ? 'Хорошо' : pct >= 60 ? 'Удовлетворительно' : 'Неудовлетворительно';
  const gColor = pct >= 90 ? '#4ade80' : pct >= 75 ? '#38bdf8' : pct >= 60 ? '#fbbf24' : '#f87171';
  document.getElementById('result-emoji').textContent = pct >= 60 ? '🎯' : '📋';
  document.getElementById('result-title').textContent = 'Раздел ' + (state.sectionIdx + 1) + ' завершён';
  document.getElementById('stat-pct').textContent = pct + '%'; document.getElementById('stat-pct').style.color = gColor;
  document.getElementById('stat-score').textContent = state.score + '/' + total;
  document.getElementById('stat-grade').textContent = grade; document.getElementById('stat-grade').style.color = gColor;
  const errBlock = document.getElementById('errors-block');
  if (!state.wrongAnswers.length) {
    errBlock.innerHTML = '<div style="text-align:center;color:#4ade80;font-size:17px;font-weight:700;padding:14px 0">🎉 Все ответы верны!</div>';
  } else {
    let html = '<div class="errors-title">✗ Ошибки (' + state.wrongAnswers.length + ')</div><div class="errors-list">';
    state.wrongAnswers.forEach(w => {
      html += '<div class="error-card"><div class="error-q">'+esc(w.question)+'</div><div class="error-wrong">✗ Ваш ответ: '+esc(w.yourAnswer)+'</div><div class="error-right">✓ Правильно: '+esc(w.correctAnswer)+'</div></div>';
    });
    html += '</div>'; errBlock.innerHTML = html;
  }
}

document.getElementById('btn-confirm').onclick = confirmAnswer;
document.getElementById('btn-next').onclick = nextQuestion;
document.getElementById('btn-retry').onclick = () => startQuiz(state.sectionIdx);
document.getElementById('btn-home-r').onclick = goHome;

buildSections();
renderGrid();
show('home');
</script>
</body>
</html>
